<span class="title">Gestion des utilisateurs</span>
<div class="flex-column gap-4 w-100 h-100">
  <p-table [value]="users()" [scrollable]="true" scrollHeight="100%" class="mh-0 h-100 table-grow">
    <ng-template #caption>
      <div class="flex-row justify-end">
        <p-button label="Ajouter un utilisateur" icon="pi pi-plus" [outlined]="true" (click)="addUser()" />
      </div>
    </ng-template>
    <ng-template #header>
      <tr>
        <th>Nom</th>
        <th>Prénom</th>
        <th>Email</th>
      </tr>
    </ng-template>
    <ng-template #body let-user>
      <tr>
        <td>{{ user.lastname }}</td>
        <td>{{ user.firstname }}</td>
        <td>{{ user.email }}</td>
      </tr>
    </ng-template>
  </p-table>
</div>
